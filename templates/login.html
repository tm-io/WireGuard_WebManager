<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WireGuard Web Manager - ログイン</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            color-scheme: dark light;
            --bg: #0f172a;
            --panel: #111827;
            --accent: #22c55e;
            --accent-soft: rgba(34, 197, 94, 0.15);
            --border: #1f2937;
            --text: #e5e7eb;
            --text-muted: #9ca3af;
            --danger: #f97373;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1f2937, var(--bg));
            color: var(--text);
        }
        .card {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(145deg, var(--panel), #020617);
            border-radius: 18px;
            padding: 28px 26px 26px;
            box-shadow:
                0 18px 45px rgba(0, 0, 0, 0.75),
                0 0 0 1px rgba(148, 163, 184, 0.15);
        }
        .title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .logo {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            border: 1px solid rgba(34, 197, 94, 0.5);
            background:
                radial-gradient(circle at 30% 30%, #bbf7d0 0, transparent 55%),
                radial-gradient(circle at 70% 70%, #22c55e 0, transparent 60%),
                radial-gradient(circle at 0 100%, #16a34a 0, transparent 55%);
            position: relative;
        }
        .logo::after {
            content: "";
            position: absolute;
            inset: 6px;
            border-radius: inherit;
            border: 1px solid rgba(15, 118, 110, 0.35);
        }
        h1 {
            font-size: 1.1rem;
            margin: 0;
        }
        .subtitle {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 22px;
        }
        label {
            display: block;
            font-size: 0.78rem;
            margin-bottom: 6px;
            color: var(--text-muted);
        }
        input {
            width: 100%;
            padding: 9px 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.9);
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }
        input:focus {
            border-color: rgba(34, 197, 94, 0.8);
            box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.35);
            background: rgba(15, 23, 42, 1);
        }
        .field {
            margin-bottom: 12px;
        }
        .hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        button {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 9px 0;
            background: linear-gradient(135deg, #22c55e, #4ade80);
            color: #022c22;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow:
                0 10px 30px rgba(34, 197, 94, 0.35),
                0 0 0 1px rgba(21, 128, 61, 0.4);
            transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
        }
        button:hover {
            filter: brightness(1.04);
            box-shadow:
                0 14px 35px rgba(34, 197, 94, 0.42),
                0 0 0 1px rgba(22, 163, 74, 0.5);
        }
        button:active {
            transform: translateY(1px);
            box-shadow:
                0 8px 20px rgba(34, 197, 94, 0.4),
                0 0 0 1px rgba(22, 163, 74, 0.55);
        }
        .btn-icon {
            width: 16px;
            height: 16px;
            border-radius: 999px;
            border: 1px solid rgba(22, 101, 52, 0.55);
            background: radial-gradient(circle at 30% 20%, #ecfdf5 0, transparent 55%);
            position: relative;
        }
        .btn-icon::after {
            content: "";
            position: absolute;
            inset: 3px 4px 3px 5px;
            border-radius: 999px;
            border: 1px solid rgba(22, 163, 74, 0.8);
        }
        .footer {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.72rem;
            color: var(--text-muted);
        }
        .badge {
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            background: radial-gradient(circle at 0 0, rgba(34, 197, 94, 0.35), transparent 55%);
        }
        .error {
            margin-bottom: 12px;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid rgba(248, 113, 113, 0.6);
            background: rgba(127, 29, 29, 0.65);
            color: #fecaca;
            font-size: 0.8rem;
        }
        .error strong {
            margin-right: 4px;
        }
    </style>
</head>
<body>
<main class="card">
    <header class="title">
        <div class="logo" aria-hidden="true"></div>
        <div>
            <h1>WireGuard Web Manager</h1>
        </div>
    </header>
    <p class="subtitle">管理用ダッシュボードにログインしてください。</p>

    {% if error %}
        <div class="error">
            <strong>認証エラー:</strong> {{ error }}
        </div>
    {% endif %}

    <form method="post" action="/login">
        <div class="field">
            <label for="username">ユーザー名</label>
            <input id="username" name="username" type="text" autocomplete="username" required>
        </div>
        <div class="field">
            <label for="password">パスワード</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <p class="hint">
            デフォルトの認証情報は <code>config.yaml</code> の
            <code>app.auth_username</code> / <code>app.auth_password</code> で変更できます。
        </p>
        <button type="submit">
            <span class="btn-icon" aria-hidden="true"></span>
            <span>ダッシュボードへサインイン</span>
        </button>
    </form>

    <footer class="footer">
        <span class="badge">Phase 1 &mdash; Auth Ready</span>
        <span>WireGuard 管理UI</span>
    </footer>
</main>
</body>
</html>
