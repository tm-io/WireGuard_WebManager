{% extends "base.html" %}
{% block title %}WireGuard Web Manager - {{ title }}{% endblock %}

{% block extra_css %}
<style>
    .doc-body { max-width: 720px; margin-top: 16px; font-size: 0.9rem; line-height: 1.6; }
    .doc-body h1 { font-size: 1.25rem; margin: 0 0 12px; }
    .doc-body h2 { font-size: 1.1rem; margin: 20px 0 8px; }
    .doc-body h3 { font-size: 1rem; margin: 14px 0 6px; }
    .doc-body p { margin: 0 0 10px; }
    .doc-body ul, .doc-body ol { margin: 0 0 10px; padding-left: 24px; }
    .doc-body li { margin-bottom: 4px; }
    .doc-body code { background: rgba(15, 23, 42, 0.95); padding: 2px 6px; border-radius: 4px; font-size: 0.88em; }
    .doc-body pre { background: rgba(15, 23, 42, 0.95); padding: 12px; border-radius: 8px; overflow-x: auto; margin: 10px 0; }
    .doc-body pre code { padding: 0; background: none; }
    .doc-body table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 0.85rem; }
    .doc-body th, .doc-body td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .doc-body th { background: rgba(34, 197, 94, 0.12); }
    .doc-body a { color: var(--accent); }
    .doc-back { margin-bottom: 12px; }
    .doc-back a { font-size: 0.85rem; color: var(--text-muted); text-decoration: none; }
    .doc-back a:hover { color: var(--accent); }
</style>
{% endblock %}

{% block content %}
<div class="panel">
    <div class="doc-back"><a href="/manual">← ドキュメント一覧</a></div>
    <div class="panel-title">{{ title }}</div>
    <div class="doc-body">
        {{ html_body | safe }}
    </div>
</div>
{% endblock %}
