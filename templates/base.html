<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}WireGuard Web Manager{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            color-scheme: dark light;
            --bg: #020617;
            --panel: #020617;
            --panel-soft: #020617;
            --accent: #22c55e;
            --accent-soft: rgba(34, 197, 94, 0.16);
            --border: #1f2937;
            --border-soft: #0b1120;
            --text: #e5e7eb;
            --text-muted: #9ca3af;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(34, 197, 94, 0.2), transparent 55%),
                radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.18), transparent 55%),
                var(--bg);
            color: var(--text);
        }
        .app-wrap {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 220px;
            flex-shrink: 0;
            padding: 20px 0 24px 16px;
            border-right: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.6), rgba(2, 6, 23, 0.85));
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
        }
        .sidebar-avatar {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            border: 1px solid rgba(34, 197, 94, 0.4);
            background:
                radial-gradient(circle at 30% 20%, rgba(187, 247, 208, 0.9), transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(34, 197, 94, 0.5), transparent 60%);
        }
        .sidebar-username { font-size: 0.9rem; font-weight: 600; }
        .sidebar-nav { flex: 1; }
        .sidebar-nav-title {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 4px 10px 6px;
            margin-bottom: 4px;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            margin: 2px 6px 2px 0;
            border-radius: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .sidebar-nav a:hover {
            background: rgba(34, 197, 94, 0.12);
            color: var(--text);
        }
        .sidebar-nav a.active {
            background: rgba(34, 197, 94, 0.18);
            color: var(--accent);
        }
        .sidebar-nav-icon {
            width: 18px;
            height: 18px;
            opacity: 0.85;
        }
        .sidebar-footer {
            padding-top: 12px;
            border-top: 1px solid var(--border-soft);
        }
        .sidebar .logout {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            border: 1px solid transparent;
            transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }
        .sidebar .logout:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.4);
            color: #fecaca;
        }
        .logout-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: radial-gradient(circle at 30% 20%, #fecaca, #ef4444 65%);
        }
        .main {
            flex: 1;
            min-width: 0;
            padding: 24px 28px 40px;
            overflow-x: hidden;
        }
        @media (max-width: 600px) {
            .app-wrap { flex-direction: column; }
            .sidebar {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 12px 16px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .sidebar-nav { order: 3; width: 100%; }
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-bottom: 20px;
        }
        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
        .card {
            border-radius: 14px;
            padding: 16px 18px;
            border: 1px solid var(--border);
            background: radial-gradient(circle at top left, rgba(34, 197, 94, 0.12), transparent 55%), var(--panel);
            box-shadow: 0 1px 0 rgba(255,255,255,0.03);
        }
        .card-title {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .card-value { font-size: 1.1rem; font-weight: 600; }
        .card-value.accent { color: var(--accent); }
        .card-row {
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
        }
        .card-row span:first-child { color: var(--text-muted); }
        .card-link {
            display: inline-block;
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--accent);
            text-decoration: none;
        }
        .card-link:hover { text-decoration: underline; }
        .panel {
            border-radius: 18px;
            padding: 18px 20px 16px;
            border: 1px solid var(--border);
            background: radial-gradient(circle at top left, rgba(34, 197, 94, 0.18), transparent 55%), var(--panel);
            box-shadow: 0 22px 55px rgba(15, 23, 42, 0.9), 0 0 0 1px rgba(15, 23, 42, 0.9);
        }
        .panel.secondary {
            background: radial-gradient(circle at top, rgba(59, 130, 246, 0.18), transparent 55%), var(--panel-soft);
        }
        .panel-title { font-size: 0.85rem; font-weight: 600; }
        .panel-label { font-size: 0.7rem; color: var(--text-muted); }
        .peers-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .rows {
            font-size: 0.78rem;
            border-radius: 14px;
            border: 1px solid var(--border-soft);
            padding: 8px 10px;
            background: rgba(15, 23, 42, 0.95);
        }
        .row { display: flex; justify-content: space-between; padding: 4px 0; }
        .row span:first-child { color: var(--text-muted); }
        .row span:last-child {
            font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        .hint { margin-top: 10px; font-size: 0.7rem; color: var(--text-muted); }
        .hint code { font-size: 0.72rem; }
        .btn {
            border-radius: 999px;
            border: 1px solid rgba(34, 197, 94, 0.6);
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.16), rgba(34, 197, 94, 0.35));
            color: #bbf7d0;
            font-size: 0.76rem;
            padding: 5px 10px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .btn span.dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: radial-gradient(circle at 30% 20%, #bbf7d0, #22c55e 70%);
        }
        .table {
            margin-top: 6px;
            width: 100%;
            border-collapse: collapse;
            font-size: 0.76rem;
        }
        .table th, .table td {
            padding: 6px 8px;
            border-bottom: 1px solid rgba(15, 23, 42, 0.9);
        }
        .table th {
            text-align: left;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.72rem;
        }
        .badge-status {
            border-radius: 999px;
            padding: 2px 10px;
            border: 1px solid rgba(34, 197, 94, 0.5);
            font-size: 0.7rem;
            color: var(--accent);
            background: rgba(22, 163, 74, 0.15);
            cursor: pointer;
            white-space: nowrap;
        }
        .badge-status.off {
            border-color: rgba(239, 68, 68, 0.65);
            color: #fecaca;
            background: rgba(127, 29, 29, 0.6);
        }
        .actions { display: flex; gap: 6px; }
        .action-link {
            border-radius: 999px;
            padding: 2px 8px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            color: var(--text-muted);
            cursor: pointer;
        }
        .pill-input {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 4px 8px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            background: rgba(15, 23, 42, 0.9);
        }
        .pill-input input {
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
            font-size: 0.72rem;
            width: 170px;
        }
        .pill-input small { font-size: 0.68rem; color: var(--text-muted); }
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 40;
        }
        .modal {
            background: radial-gradient(circle at top, rgba(34, 197, 94, 0.18), transparent 55%), #020617;
            border-radius: 18px;
            padding: 16px 18px 14px;
            border: 1px solid rgba(34, 197, 94, 0.6);
            max-width: 340px;
            width: 90%;
            box-shadow: 0 22px 55px rgba(15, 23, 42, 0.9), 0 0 0 1px rgba(15, 23, 42, 0.9);
            text-align: center;
        }
        .modal h2 { margin: 0 0 8px; font-size: 0.9rem; }
        .modal p { margin: 0 0 10px; font-size: 0.72rem; color: var(--text-muted); }
        .modal img {
            max-width: 220px;
            width: 100%;
            border-radius: 12px;
            background: #020617;
            padding: 6px;
        }
        .modal button {
            margin-top: 10px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            background: rgba(15, 23, 42, 0.9);
            color: var(--text-muted);
            font-size: 0.76rem;
            padding: 5px 12px;
            cursor: pointer;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
<div class="app-wrap">
    <aside class="sidebar">
        <div class="sidebar-user">
            <div class="sidebar-avatar" aria-hidden="true"></div>
            <span class="sidebar-username">{{ username }}</span>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-nav-title">メニュー</div>
            <a href="/dashboard" class="{% if active_page == 'dashboard' %}active{% endif %}" {% if active_page == 'dashboard' %}aria-current="page"{% endif %}>
                <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                ダッシュボード
            </a>
            <a href="/peers" class="{% if active_page == 'peers' %}active{% endif %}" {% if active_page == 'peers' %}aria-current="page"{% endif %}>
                <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                ピア一覧
            </a>
            <a href="/settings" class="{% if active_page == 'settings' %}active{% endif %}" {% if active_page == 'settings' %}aria-current="page"{% endif %}>
                <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                設定
            </a>
            <a href="/manual" class="{% if active_page == 'docs' %}active{% endif %}" {% if active_page == 'docs' %}aria-current="page"{% endif %}>
                <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                ドキュメント
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout" class="logout">
                <span class="logout-dot" aria-hidden="true"></span>
                サインアウト
            </a>
        </div>
    </aside>

    <main class="main">
        {% block content %}{% endblock %}
    </main>
</div>
{% block modals %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
