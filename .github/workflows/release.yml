name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build & Package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y wireguard-tools

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - name: Build release binaries
        working-directory: rust
        run: cargo build --release --workspace

      # .deb パッケージ生成（Ubuntu / Debian 向け）
      - name: Package .deb (Debian/Ubuntu)
        working-directory: rust
        run: cargo deb -p wg-manager --no-build

      # .rpm パッケージ生成（RHEL / Rocky / AlmaLinux 向け、Ubuntu 上でクロスパッケージング）
      - name: Package .rpm (RHEL/Rocky/Alma)
        working-directory: rust
        run: cargo generate-rpm -p wg-manager

      - name: Locate generated packages
        id: pkg
        run: |
          DEB=$(find rust/target/debian -name "*.deb" | head -1)
          RPM=$(find rust/target/generate-rpm -name "*.rpm" | head -1)
          echo "deb=${DEB}" >> $GITHUB_OUTPUT
          echo "rpm=${RPM}" >> $GITHUB_OUTPUT
          echo "Found .deb: ${DEB}"
          echo "Found .rpm: ${RPM}"

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.pkg.outputs.deb }}
            ${{ steps.pkg.outputs.rpm }}
